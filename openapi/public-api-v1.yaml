openapi: 3.1.0
info:
  title: Brew Public API v1
  version: 1.0.0
  description: |-
    Generated from the Brew app Zod contracts for the current `/api/v1/contacts`, `/api/v1/audiences`, `/api/v1/domains`, `/api/v1/fields`, `/api/v1/emails`, `/api/v1/templates`, and `/api/v1/sends` endpoints. This file is the source of truth for the public API documentation.

    ## Brand scoping

    API keys are always scoped to a specific brand. When an API key is used:

    - Brand-scoped list and read endpoints (`/v1/audiences`, `/v1/domains`, `/v1/emails`, `/v1/contacts`, `/v1/fields`) automatically filter to that brand.
    - Passing a different `brandId` (when the endpoint accepts one) returns `403 BRAND_SCOPE_MISMATCH`.
    - Endpoints that operate on resources tagged with another brand return `404` (resource not visible) or `403 BRAND_SCOPE_MISMATCH` for trigger / automation routes.
    - `GET /v1/templates` is organization-wide and not constrained to the key brand.
    - `GET /v1/domains` returns verified sending domains for the key brand.
    - Brands themselves are managed in the Brew dashboard (the public API no longer exposes endpoints to create or list brands). The `brandId` returned in the dashboard is the value to pass to `POST /v1/emails` and is the same value bound to your API key.
  contact:
    name: Brew Support
    url: https://docs.getbrew.io
    email: support@brew.new
servers:
  - url: https://brew.new/api
    description: Production
  - url: http://localhost:3000/api
    description: Local development
security:
  - bearerAuth: []
  - apiKeyAuth: []
tags:
  - name: Contacts
    description: Create, query, patch, and delete contacts.
  - name: Audiences
    description: List saved audiences available for the org.
  - name: Domains
    description: List verified sending domains available for the org.
  - name: Contact Fields
    description: List, create, and delete custom contact field definitions.
  - name: Emails
    description: Generate draft emails through the Brew email agent.
  - name: Templates
    description: List public templates that can be used as references.
  - name: Sends
    description: Start async send jobs for saved emails.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key
      description: "Send your Brew API key as `Authorization: Bearer brew_xxx`."
      x-default: brew_your_api_key
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: "Send your Brew API key as `X-API-Key: brew_xxx`."
      x-default: brew_your_api_key
  schemas:
