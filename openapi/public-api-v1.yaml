                type: integer
                description: Requests remaining in the current rolling rate limit window.
                example: 99
              required: true
              description: Requests remaining in the current rolling rate limit window.
            X-RateLimit-Reset:
              schema:
                type: integer
                description: Unix timestamp in seconds for when the rolling window fully resets.
                example: 1712592360
              required: true
              description: Unix timestamp in seconds for when the rolling window fully resets.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendsPostResponse"
              example:
                status: queued
                sendId: snd_8fK2mQ4p
                runId: wrun_abc
        "400":
