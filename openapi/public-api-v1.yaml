        contact:
          type: object
          properties:
            email:
              type: string
              format: email
            firstName:
              type: string
            lastName:
              type: string
            subscribed:
              type: boolean
              default: true
            verificationStatus:
              type: string
              enum:
                - valid
                - risky
                - invalid
            suppressed:
              type: boolean
              default: false
            suppressedReason:
              type:
                - string
                - "null"
            createdAt:
              type: number
            updatedAt:
              type: number
            importId:
              type:
                - string
                - "null"
            customFields:
              type: object
              additionalProperties: {}
              default: {}
          required:
            - email
            - createdAt
            - updatedAt
          additionalProperties: false
      required:
        - contact
      additionalProperties: false
    ContactsListResponse:
      type: object
      properties:
        contacts:
          type: array
          items:
            type: object
            properties:
              email:
                type: string
                format: email
              firstName:
                type: string
              lastName:
                type: string
              subscribed:
                type: boolean
                default: true
              verificationStatus:
                type: string
                enum:
                  - valid
                  - risky
                  - invalid
              suppressed:
                type: boolean
                default: false
              suppressedReason:
                type:
                  - string
                  - "null"
              createdAt:
                type: number
              updatedAt:
                type: number
              importId:
                type:
                  - string
                  - "null"
              customFields:
                type: object
                additionalProperties: {}
                default: {}
            required:
              - email
              - createdAt
              - updatedAt
            additionalProperties: false
        pagination:
          type: object
          properties:
            limit:
              type: integer
              minimum: 1
              maximum: 100
            cursor:
              type:
                - string
                - "null"
            hasMore:
              type: boolean
          required:
            - limit
            - cursor
            - hasMore
          additionalProperties: false
      required:
