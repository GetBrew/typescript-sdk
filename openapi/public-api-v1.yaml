paths:
  /v1/emails:
    get:
      operationId: listEmails
      tags:
        - Emails
      summary: List emails
      description: Lists the brand’s email designs (newest first) under the uniform `{ data, pagination }` envelope. Each row carries the design’s `emailId`, the `emailVersionId` of the current latest version, and `title`. Filter with `?status=` and the `createdAtFrom/To` + `updatedAtFrom/To` ISO-8601 windows; paginate with `limit` + `cursor`.
      parameters:
        - schema:
            type: string
            enum:
              - streaming
              - complete
              - error
          required: false
          name: status
          in: query
        - schema:
            type: string
            format: date-time
          required: false
          name: createdAtFrom
          in: query
        - schema:
            type: string
            format: date-time
          required: false
          name: createdAtTo
          in: query
        - schema:
            type: string
            format: date-time
          required: false
          name: updatedAtFrom
          in: query
        - schema:
            type: string
            format: date-time
          required: false
          name: updatedAtTo
          in: query
        - schema:
            anyOf:
              - type: number
              - type: string
          required: false
          name: limit
          in: query
        - schema:
            type: string
            minLength: 1
            maxLength: 512
          required: false
          name: cursor
          in: query
      responses:
        "200":
          description: A page of email designs.
          headers:
            x-request-id:
              schema:
                type: string
                description: Unique request identifier. Share this with support when debugging a request.
                example: req_8cac13fd94e6420cacdd75a1aa403a28
              required: true
              description: Unique request identifier. Share this with support when debugging a request.
            X-RateLimit-Limit:
              schema:
                type: integer
                description: Requests allowed in the current rolling rate limit window.
                example: 100
              required: true
              description: Requests allowed in the current rolling rate limit window.
            X-RateLimit-Remaining:
              schema:
                type: integer
                description: Requests remaining in the current rolling rate limit window.
                example: 99
              required: true
              description: Requests remaining in the current rolling rate limit window.
            X-RateLimit-Reset:
              schema:
                type: integer
                description: Unix timestamp in seconds for when the rolling window fully resets.
                example: 1712592360
              required: true
              description: Unix timestamp in seconds for when the rolling window fully resets.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailsListResponse"
              example:
                data:
                  - emailId: eml_welcome
                    emailVersionId: emv_welcome_v3
                    title: Welcome Email
                  - emailId: eml_digest
                    emailVersionId: emv_digest_v1
                    title: May product digest
                pagination:
                  limit: 100
                  cursor: null
                  hasMore: false
        "400":
          description: Invalid query (unknown param, bad enum, or a `*From` later than its `*To`).
          headers:
            x-request-id:
              schema:
                type: string
                description: Unique request identifier. Share this with support when debugging a request.
                example: req_8cac13fd94e6420cacdd75a1aa403a28
              required: true
              description: Unique request identifier. Share this with support when debugging a request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorEnvelope"
              example:
                error:
                  code: INVALID_REQUEST
                  type: invalid_request
                  message: Request validation failed.
                  suggestion: Fix the field reported in `param` and retry.
                  docs: https://docs.brew.new/api-reference/api/errors
                  param: status
        "401":
          description: The API key was missing, invalid, or revoked.
          headers:
            x-request-id:
              schema:
                type: string
                description: Unique request identifier. Share this with support when debugging a request.
                example: req_8cac13fd94e6420cacdd75a1aa403a28
              required: true
              description: Unique request identifier. Share this with support when debugging a request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorEnvelope"
              example:
                error:
                  code: INVALID_API_KEY
