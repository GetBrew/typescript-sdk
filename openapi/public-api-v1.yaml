  /v1/automations:
    post:
      operationId: createAutomation
      tags:
        - Automations
      summary: Create an automation (deterministic)
      description: |-
        Deterministic create — caller supplies the full graph (`{ name, triggerEventId, nodes, connections }`). Returns the canonical `AutomationRow`.

        AI authoring is intentionally not part of the public surface — chain `POST /v1/emails { emailType: "automation", prompt }` (×N) first to mint the bodies that `sendEmail` nodes reference, then POST the explicit graph here.

        **Dry-run** — add `dryRun: true` to validate-without-persist; returns `{ valid, blockers[], warnings[], nodeCounts }`.
      parameters:
        - *a2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutomationsPostRequest"
            examples:
              deterministic:
                summary: Deterministic create
                value:
                  name: Welcome Sequence
                  description: 3-step onboarding drip
                  triggerEventId: tri_signup
                  nodes:
                    - &a4
                      id: trg
                      label: On signup
                      type: trigger
                      config:
                        actionType: trigger
                    - &a5
                      id: send_welcome
                      label: Welcome
                      type: sendEmail
                      config:
                        actionType: sendEmail
                        emailId: eml_welcome
                        emailVersionId: emv_welcome_v1
                        domainId: dom_brand_primary
                        subject: Welcome to Brew, {{firstName | there}}!
                        previewText: Thanks for signing up — get started in 2 minutes.
                        fromName: Brew
                        replyTo: support@example.com
                  connections:
                    - from: trg
                      to: send_welcome
              dryRun:
                summary: Validate without persisting
                value:
                  name: preview
                  triggerEventId: tri_signup
                  nodes:
                    - *a4
                  connections: []
                  dryRun: true
      responses:
        "200":
          description: Dry-run result (no Convex writes). `valid` indicates whether the graph would publish cleanly.
          headers:
            x-request-id:
              schema:
                type: string
                description: Unique request identifier. Share this with support when debugging a request.
                example: req_8cac13fd94e6420cacdd75a1aa403a28
              required: true
              description: Unique request identifier. Share this with support when debugging a request.
        "201":
          description: "Created. Returns `{ automations: [row] }` — a one-element list of the canonical automation row."
          headers:
            x-request-id:
              schema:
                type: string
                description: Unique request identifier. Share this with support when debugging a request.
                example: req_8cac13fd94e6420cacdd75a1aa403a28
              required: true
              description: Unique request identifier. Share this with support when debugging a request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationsListResponse"
        "400":
          description: Missing required field, strict-mode body violation, OR the graph references emails / domains that do not exist or are the wrong type. The `AUTOMATION_GRAPH_INVALID` response includes `error.details.issues` with one entry per offending node / connection.
          headers:
            x-request-id:
              schema:
                type: string
                description: Unique request identifier. Share this with support when debugging a request.
                example: req_8cac13fd94e6420cacdd75a1aa403a28
              required: true
              description: Unique request identifier. Share this with support when debugging a request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorEnvelope"
              examples:
                schemaInvalid:
                  summary: Required field missing
                  value:
                    error:
                      code: INVALID_REQUEST
                      type: invalid_request
                      message: Request body validation failed.
                      suggestion: Send the deterministic shape `{ name, triggerEventId, nodes, connections }` with each sendEmail node carrying `emailId`, `emailVersionId`, `domainId`, `subject`, `previewText`.
                      docs: https://docs.brew.new/api-reference/api/errors
                graphInvalid:
                  summary: Graph references unknown email / domain
                  value:
                    error:
                      code: AUTOMATION_GRAPH_INVALID
                      type: invalid_request
                      message: "\"Welcome\" references emailVersionId 'emv_missing' which does not exist in this brand. (and 1 more graph issue)"
                      param: nodes[0].config.emailVersionId
                      suggestion: Fix every issue reported in `details.issues` then resubmit. Each entry includes the offending `nodeId` (or connection index) and a `kind` discriminator your SDK can branch on.
                      docs: https://docs.brew.new/api-reference/api/errors
                      details:
                        issues:
                          - kind: email_not_found
                            nodeId: send_welcome
                            nodeLabel: Welcome
                            message: "\"Welcome\" references emailVersionId 'emv_missing' which does not exist in this brand. Generate the email via POST /v1/emails (emailType: 'automation' | 'transactional') and reuse the returned emailId + emailVersionId."
                          - kind: domain_not_ready
                            nodeId: send_welcome
                            nodeLabel: Welcome
                            message: "\"Welcome\" references domain 'dom_unverified' which is not verified for sending. Finish domain verification or pick a different domainId."
        "404":
          description: Referenced `triggerEventId` does not exist in this brand.
          headers:
            x-request-id:
              schema:
                type: string
                description: Unique request identifier. Share this with support when debugging a request.
                example: req_8cac13fd94e6420cacdd75a1aa403a28
              required: true
              description: Unique request identifier. Share this with support when debugging a request.
          content:
            application/json:
              schema:
