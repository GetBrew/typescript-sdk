                  additionalProperties: false
            timeZone:
              type: string
              minLength: 1
              description: IANA timezone used to preserve local wall-clock time for day intervals.
            rampEndsAt:
              type: string
              format: date-time
            currentTranche:
              type: integer
              exclusiveMinimum: 0
            sentSoFar:
              type: integer
              minimum: 0
            pausedAt:
