paths:
  /v1/contacts:
    get:
      operationId: getContacts
      tags:
        - Contacts
      summary: List Contacts
      description: This endpoint supports three modes. Use `email` for single contact lookup. Use `count=true` to return only the count. Without either, Brew returns a paginated contact list.
      parameters:
        - name: email
          in: query
          required: false
          description: Look up a single contact by email address.
          schema:
            type: string
            format: email
          example: jane@example.com
        - name: count
          in: query
          required: false
          description: Return only the number of matching contacts.
          schema:
            type: boolean
            default: false
        - name: search
          in: query
          required: false
          description: Case insensitive search across email, first name, and last name.
          schema:
            type: string
            minLength: 1
          example: jane
        - name: limit
          in: query
          required: false
          description: Page size between 1 and 100.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: cursor
          in: query
          required: false
          description: Opaque pagination cursor returned from the previous list response.
          schema:
            type: string
        - name: sort
          in: query
          required: false
          description: Sort field. Use a core field or a custom field path like `customFields.plan`.
          schema:
            type: string
            default: createdAt
          example: createdAt
        - name: order
          in: query
          required: false
          description: Sort direction.
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
        - name: filter
          in: query
          required: false
          style: deepObject
          explode: true
          description: Deep object filters. Use shorthand `filter[subscribed]=true` or explicit operators like `filter[customFields.plan][equals]=enterprise`. Use `filter[_logic]=and|or|none` to control filter combination.
          schema:
            type: object
            properties:
              _logic:
                type: string
                enum:
                  - and
                  - or
                  - none
                default: and
            additionalProperties:
              oneOf:
                - type: string
                - type: object
                  additionalProperties:
                    oneOf:
                      - type: string
                      - type: number
                      - type: boolean
          example:
            _logic: and
            subscribed: "true"
            customFields.plan:
              equals: enterprise
      responses:
        "200":
          description: Lookup mode returns a single contact. Count mode returns a count. List mode returns contacts plus pagination.
          headers:
            x-request-id:
              schema:
                type: string
                description: Unique request identifier. Share this with support when debugging a request.
                example: req_8cac13fd94e6420cacdd75a1aa403a28
              required: true
              description: Unique request identifier. Share this with support when debugging a request.
            X-RateLimit-Limit:
              schema:
                type: integer
                description: Requests allowed in the current rolling rate limit window.
                example: 100
              required: true
              description: Requests allowed in the current rolling rate limit window.
            X-RateLimit-Remaining:
              schema:
                type: integer
                description: Requests remaining in the current rolling rate limit window.
                example: 99
              required: true
              description: Requests remaining in the current rolling rate limit window.
            X-RateLimit-Reset:
              schema:
                type: integer
                description: Unix timestamp in seconds for when the rolling window fully resets.
                example: 1712592360
              required: true
              description: Unix timestamp in seconds for when the rolling window fully resets.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactsGetSuccessResponse"
              examples:
                lookup:
                  summary: Lookup by email
                  value:
                    contact: &a1
                      email: jane@example.com
                      firstName: Jane
                      lastName: Doe
                      subscribed: true
                      verificationStatus: valid
                      suppressed: false
                      suppressedReason: null
                      createdAt: 1712592000000
                      updatedAt: 1712592300000
                      importId: null
                      customFields:
                        plan: enterprise
                        revenue: 4200
                count:
                  summary: Count mode
                  value:
                    count: 42
                list:
                  summary: Paginated list
                  value:
                    contacts:
                      - *a1
                      - email: john@example.com
                        firstName: John
                        lastName: Smith
                        subscribed: true
                        verificationStatus: valid
                        suppressed: false
                        suppressedReason: null
                        createdAt: 1712592000000
                        updatedAt: 1712592300000
                        importId: null
                        customFields:
                          plan: starter
                    pagination:
                      limit: 50
                      cursor: eyJsYXN0SWQiOiIxMjMiLCJsYXN0U29ydCI6MTcxMjU5MjAwMDAwMH0=
                      hasMore: true
        "400":
          description: The query parameters were invalid.
          headers:
            x-request-id:
              schema:
                type: string
                description: Unique request identifier. Share this with support when debugging a request.
                example: req_8cac13fd94e6420cacdd75a1aa403a28
              required: true
              description: Unique request identifier. Share this with support when debugging a request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorEnvelope"
              example:
                error:
                  code: INVALID_REQUEST
                  type: invalid_request
                  message: Unsupported sort field 'doesNotExist'.
                  suggestion: Fix the request payload and retry.
                  docs: https://docs.brew.new/api-reference/api/errors
