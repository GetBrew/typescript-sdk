    post:
      operationId: generateEmail
      tags:
        - Emails
      summary: Generate Email
      description: |-
        Generates a draft email through the Brew email agent. POST supports idempotency for safe retries.

        `emailType` is required and categorises the row:

        - `campaign` — one-shot send to an audience / contact list (canvas-board default).
        - `automation` — body referenced by `sendEmail` nodes inside an automation graph. Does NOT surface on the `/emails` canvas; chain with `POST /v1/automations` for the full flow.
        - `transactional` — system-triggered (welcome / receipt / reset).
      parameters:
        - *a2
      requestBody:
        required: true
        description: Email generation prompt and optional reference context. The brand is resolved from the API key and must not be passed.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailGenerateRequest"
            examples:
              campaign:
                summary: Campaign email (default canvas surface)
                value:
                  prompt: Create a welcome email for new customers who joined Brew today.
                  emailType: campaign
                  contentUrl: https://example.com/blog/product-launch
              automation:
                summary: Body for an automation `sendEmail` node
                value:
                  prompt: Day-2 nudge email for users who have not finished setup.
                  emailType: automation
              transactional:
                summary: System-triggered transactional row
                value:
                  prompt: Password reset email.
                  emailType: transactional
      responses:
        "200":
          description: Generated email artifact or a text response if no email artifact was produced.
          headers:
            x-request-id:
              schema:
                type: string
                description: Unique request identifier. Share this with support when debugging a request.
                example: req_8cac13fd94e6420cacdd75a1aa403a28
              required: true
              description: Unique request identifier. Share this with support when debugging a request.
            X-RateLimit-Limit:
              schema:
                type: integer
                description: Requests allowed in the current rolling rate limit window.
                example: 100
              required: true
              description: Requests allowed in the current rolling rate limit window.
            X-RateLimit-Remaining:
              schema:
                type: integer
                description: Requests remaining in the current rolling rate limit window.
                example: 99
