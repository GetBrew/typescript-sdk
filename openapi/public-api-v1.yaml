            startingPercentage:
              type: number
              minimum: 0.1
              maximum: 100
            incrementPercentage:
              type: number
              minimum: 0
              maximum: 100
            interval:
              oneOf:
                - type: object
                  properties:
                    value:
                      type: integer
                      minimum: 1
                      maximum: 24
                    unit:
                      type: string
                      enum:
                        - hour
                  required:
                    - value
                    - unit
                  additionalProperties: false
                - type: object
