  /v1/events:
    post:
      operationId: fireEvent
      tags:
        - Events
      summary: Fire a trigger event
      description: |-
        Fires a published trigger event by its internal `triggerEventId`. The path is fixed at `/v1/events` — trigger names, titles, and `providerEventKey` are descriptors and never appear in the URL.

        On success, every published automation attached to the trigger is started and its `executionId` is returned. Published transactional emails attached to the trigger are also delivered as part of the same fire.

        ## Idempotency
        Send a stable `Idempotency-Key` HTTP header on every retry — Brew namespaces the token with your org and dedups on `(provider="brew_api", externalEventId)` so a replay returns the original `executionIds` (status `idempotent_replay`) instead of starting new workflow runs. The legacy body field `idempotencyKey` is supported for back-compat; new integrations should use the header.

        Brand scoping: the trigger event must belong to the API key brand. A `403 BRAND_SCOPE_MISMATCH` is returned when the matched trigger is in a different brand.
      parameters:
        - *a2
      requestBody:
        required: true
        description: Trigger fire request.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FireEventRequest"
            examples:
              minimal:
                summary: Minimal body
                value:
                  triggerEventId: tri_password_reset
                  payload:
                    email: jane@example.com
                    resetUrl: https://app.example.com/reset/abc123
              withMetadata:
                summary: With metadata + idempotency key in body
                value:
                  triggerEventId: tri_order_completed
                  payload:
                    email: jane@example.com
                    firstName: Jane
                    orderId: ord_42
                    amount: 4200
                  metadata:
                    source: checkout-backend
                    region: us-east-1
                  idempotencyKey: order-confirmation-ord_42
      responses:
        "200":
          description: The trigger was accepted and matched (or replayed via idempotency).
          headers:
            x-request-id:
              schema:
                type: string
                description: Unique request identifier. Share this with support when debugging a request.
                example: req_8cac13fd94e6420cacdd75a1aa403a28
              required: true
              description: Unique request identifier. Share this with support when debugging a request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FireEventResponse"
              examples:
                triggered:
                  summary: Matched and fired
                  value:
                    success: true
                    status: triggered
                    code: TRIGGERED
                    message: Trigger event accepted and matched published attachments.
                    triggerEventId: tri_order_completed
                    receivedAt: 2026-04-08T12:34:56.789Z
                    details:
                      resolvedPayload:
                        email: jane@example.com
                        orderId: ord_42
                      executionIds:
                        - exec_01HZX1
                        - exec_01HZX2
                      counts:
                        transactionalEmails: 0
                        automations: 2
                idempotentReplay:
                  summary: Idempotent replay (no new runs)
                  value:
                    success: true
                    status: idempotent_replay
                    code: IDEMPOTENT_REPLAY
                    message: Replay of a previously accepted trigger fire — no new automation runs were started.
                    triggerEventId: tri_order_completed
                    receivedAt: 2026-04-08T12:35:00.000Z
                    details:
                      idempotencyKey: order-confirmation-ord_42
                      triggerInstanceId: tin_01HZX1
                      originalReceivedAt: 2026-04-08T12:34:56.789Z
                      executionIds:
                        - exec_01HZX1
                        - exec_01HZX2
                      state: fired
        "400":
          description: The request body was malformed or the payload did not match the trigger schema.
          headers:
            x-request-id:
              schema:
                type: string
                description: Unique request identifier. Share this with support when debugging a request.
                example: req_8cac13fd94e6420cacdd75a1aa403a28
              required: true
              description: Unique request identifier. Share this with support when debugging a request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorEnvelope"
              examples:
                missingTriggerEventId:
                  summary: Missing triggerEventId
                  value:
                    error:
                      code: MISSING_TRIGGER_EVENT_ID
                      type: invalid_request
                      message: Request body must include `triggerEventId`.
                      suggestion: Include `triggerEventId` in the JSON body. The path is `/v1/events` — never put the event name in the URL.
                      docs: https://docs.brew.new/api-reference/api/errors
                      param: triggerEventId
                payloadMismatch:
                  summary: Payload mismatch
                  value:
                    error:
                      code: INVALID_PAYLOAD
                      type: invalid_request
                      message: Payload validation failed.
                      suggestion: Send fields and types matching the trigger's payloadSchema (see GET /v1/triggers/{triggerEventId}).
                      docs: https://docs.brew.new/api-reference/api/errors
                      param: payload
        "401":
          description: The API key was missing, invalid, or revoked.
          headers:
            x-request-id:
              schema:
                type: string
                description: Unique request identifier. Share this with support when debugging a request.
                example: req_8cac13fd94e6420cacdd75a1aa403a28
              required: true
              description: Unique request identifier. Share this with support when debugging a request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorEnvelope"
              example:
                error:
                  code: UNAUTHORIZED
                  type: authentication_error
                  message: Invalid or revoked API key.
                  suggestion: "Provide `Authorization: Bearer <brew_api_key>` or `X-API-Key`. API keys are managed on Settings → API."
                  docs: https://docs.brew.new/api-reference/api/authentication
        "403":
          description: The API key brand does not match the matched trigger event, or the key is missing required permissions.
          headers:
            x-request-id:
              schema:
                type: string
                description: Unique request identifier. Share this with support when debugging a request.
                example: req_8cac13fd94e6420cacdd75a1aa403a28
              required: true
              description: Unique request identifier. Share this with support when debugging a request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorEnvelope"
              examples:
                brandMismatch:
                  summary: Brand scope mismatch
                  value:
                    error:
                      code: BRAND_SCOPE_MISMATCH
                      type: authorization_error
                      message: API key is scoped to a different brand than this trigger event.
                      suggestion: Use an API key bound to the brand the trigger belongs to.
                      docs: https://docs.brew.new/api-reference/api/authentication
                forbidden:
                  summary: Missing required permission
                  value:
                    error:
                      code: FORBIDDEN
                      type: authorization_error
                      message: API key does not have permission to trigger the matched resources.
                      suggestion: Use an API key with `automations`, `transactional`, or `all` scope.
                      docs: https://docs.brew.new/api-reference/api/authentication
        "404":
          description: No trigger event matched the supplied `triggerEventId`.
          headers:
            x-request-id:
              schema:
                type: string
                description: Unique request identifier. Share this with support when debugging a request.
                example: req_8cac13fd94e6420cacdd75a1aa403a28
              required: true
              description: Unique request identifier. Share this with support when debugging a request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorEnvelope"
              example:
                error:
                  code: TRIGGER_EVENT_NOT_FOUND
                  type: not_found
                  message: No trigger event found for "tri_unknown".
                  suggestion: Use GET /v1/triggers to list trigger events for the API key brand.
                  docs: https://docs.brew.new/api-reference/api/errors
                  param: triggerEventId
        "422":
          description: 'The trigger cannot fire as-is. Either the trigger row is disabled (`status: "disabled"`), or it is enabled but no PUBLISHED automation references it.'
          headers:
            x-request-id:
              schema:
                type: string
                description: Unique request identifier. Share this with support when debugging a request.
                example: req_8cac13fd94e6420cacdd75a1aa403a28
              required: true
              description: Unique request identifier. Share this with support when debugging a request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorEnvelope"
              examples:
                triggerDisabled:
                  summary: Trigger is disabled
                  value:
                    error:
                      code: TRIGGER_DISABLED
                      type: invalid_request
                      message: Trigger event "tri_xxx" is "disabled" — only enabled triggers can be fired.
                      suggestion: Re-enable the trigger via POST /v1/triggers/{triggerEventId}/enable before firing it.
                      docs: https://docs.brew.new/api-reference/api/errors
                      param: triggerEventId
                noPublishedAutomation:
                  summary: Trigger is published but has no published automation attached
                  value:
                    error:
                      code: NO_PUBLISHED_AUTOMATION
                      type: invalid_request
                      message: Trigger event "tri_xxx" has no published automation attached. Publish at least one automation that uses this trigger before firing.
                      suggestion: Publish at least one automation bound to this trigger via POST /v1/automations/{automationId}/publish.
                      docs: https://docs.brew.new/api-reference/api/errors
                      param: triggerEventId
        "500":
          description: Unexpected internal error.
          headers:
            x-request-id:
              schema:
                type: string
                description: Unique request identifier. Share this with support when debugging a request.
                example: req_8cac13fd94e6420cacdd75a1aa403a28
              required: true
              description: Unique request identifier. Share this with support when debugging a request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorEnvelope"
              example:
                error:
                  code: INTERNAL_ERROR
                  type: internal_error
                  message: An unexpected error occurred.
                  suggestion: Retry the request. If it keeps failing, contact support with the `x-request-id` header value.
                  docs: https://docs.brew.new/api-reference/api/errors
    get:
      operationId: listEvents
      tags:
