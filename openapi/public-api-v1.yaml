                $ref: "#/components/schemas/ContactsSearchSuccessResponse"
              examples:
                page:
                  summary: Result page
                  value:
                    data:
                      - *a15
                      - email: john@example.com
                        firstName: John
                        lastName: Smith
                        subscribed: true
                        validationStatus: valid
                        verificationStatus: valid
                        suppressed: false
                        suppressedReason: null
                        createdAt: 2026-04-08T12:00:00.000Z
                        updatedAt: 2026-04-08T12:05:00.000Z
                        importId: null
                        customFields:
                          plan: starter
                    pagination:
                      limit: 50
                      cursor: eyJsYXN0SWQiOiIxMjMiLCJsYXN0U29ydCI6MTcxMjU5MjAwMDAwMH0=
                      hasMore: true
                count:
                  summary: Count mode
                  value:
                    count: 1284
        "400":
          description: The request body or query string was invalid (unknown key, wrong type, or missing required field). Strict schemas reject unknown keys — including `brandId`, which is always resolved from the API key.
          headers:
            x-request-id:
              schema:
