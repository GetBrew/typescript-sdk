  /v1/automation/runs:
    post:
      operationId: createAutomationRun
      tags:
        - Automation Runs
      summary: Fire a trigger, test an automation, or replay a historical fire
      description: |-
        POST body is a 3-branch union, dispatched by body shape:

        - **Fire** — `{ triggerEventId, payload, idempotencyKey?, dryRun? }`. Starts one Vercel Workflow per published automation attached to the trigger and returns `{ automationRunIds[], triggerInstanceId, status: "triggered" | "idempotent_replay" }`.
        - **Test** — `{ automationId, mode: "test", payload? }`. Suppression-aware test run; no real mail sent.
        - **Replay** — `{ automationId, triggerInstanceId, mode: "replay" }` (NOT_IMPLEMENTED, P7).

        Supports `Idempotency-Key` header on the fire branch — retries with the same key return the original `automationRunIds` without starting duplicate workflow runs.
      parameters:
        - *a2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutomationRunsPostRequest"
            examples:
              fire:
                summary: Fire a trigger
                value:
                  triggerEventId: tri_password_reset
                  payload:
                    email: jane@example.com
                    resetUrl: https://app.example.com/reset/abc
                  idempotencyKey: reset-jane-2026-04-08
              test:
                summary: Test a saved automation
                value:
                  automationId: auto_abc
                  mode: test
                  payload:
                    email: qa@example.com
              replay:
                summary: Replay a historical fire (P7 — NOT_IMPLEMENTED)
                value:
                  automationId: auto_abc
                  triggerInstanceId: tin_01HZ
                  mode: replay
      responses:
        "200":
          description: Idempotent replay — original `automationRunIds` returned.
          headers:
            x-request-id:
              schema:
                type: string
                description: Unique request identifier. Share this with support when debugging a request.
                example: req_8cac13fd94e6420cacdd75a1aa403a28
              required: true
              description: Unique request identifier. Share this with support when debugging a request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationRunsPostResponse"
        "202":
          description: Fire / test accepted.
          headers:
            x-request-id:
              schema:
                type: string
                description: Unique request identifier. Share this with support when debugging a request.
                example: req_8cac13fd94e6420cacdd75a1aa403a28
              required: true
              description: Unique request identifier. Share this with support when debugging a request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationRunsPostResponse"
        "400":
          description: Invalid payload OR body matched no branch / multiple branches.
          headers:
            x-request-id:
              schema:
                type: string
                description: Unique request identifier. Share this with support when debugging a request.
                example: req_8cac13fd94e6420cacdd75a1aa403a28
              required: true
              description: Unique request identifier. Share this with support when debugging a request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorEnvelope"
              example:
                error:
                  code: INVALID_REQUEST
                  type: invalid_request
                  message: Invalid request payload.
                  suggestion: 'Send one of: { triggerEventId, payload } (fire), { automationId, mode: "test" }, { automationId, triggerInstanceId, mode: "replay" }.'
                  docs: https://docs.brew.new/api-reference/api/errors
        "404":
          description: Automation not found for test / replay.
          headers:
            x-request-id:
              schema:
                type: string
                description: Unique request identifier. Share this with support when debugging a request.
                example: req_8cac13fd94e6420cacdd75a1aa403a28
              required: true
              description: Unique request identifier. Share this with support when debugging a request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorEnvelope"
              example:
                error:
                  code: AUTOMATION_NOT_FOUND
                  type: not_found
                  message: Automation 'auto_xxx' was not found.
                  suggestion: Use GET /v1/automations to list automations.
                  docs: https://docs.brew.new/api-reference/api/errors
                  param: automationId
        "422":
          description: Trigger is disabled OR no published automation attached for fire.
          headers:
            x-request-id:
              schema:
                type: string
                description: Unique request identifier. Share this with support when debugging a request.
                example: req_8cac13fd94e6420cacdd75a1aa403a28
              required: true
              description: Unique request identifier. Share this with support when debugging a request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorEnvelope"
              example:
                error:
                  code: TRIGGER_DISABLED
                  type: invalid_request
                  message: Trigger event 'tri_xxx' is disabled — only enabled triggers can be fired.
                  suggestion: 'PATCH /v1/triggers { triggerEventId, status: "enabled" }.'
                  docs: https://docs.brew.new/api-reference/api/errors
                  param: triggerEventId
        "501":
          description: Replay branch is gated behind P7.
          headers:
            x-request-id:
              schema:
                type: string
                description: Unique request identifier. Share this with support when debugging a request.
                example: req_8cac13fd94e6420cacdd75a1aa403a28
              required: true
              description: Unique request identifier. Share this with support when debugging a request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorEnvelope"
              example:
                error:
                  code: NOT_IMPLEMENTED
                  type: not_implemented
                  message: This endpoint shell is ready, but the business logic is not implemented yet.
                  suggestion: Use the test branch to validate without delivering, OR the fire branch with a deduplicated idempotency key.
                  docs: https://docs.brew.new/api-reference/api/errors
    get:
      operationId: listAutomationRuns
      tags:
        - Automation Runs
      summary: List recent automation runs (filterable) OR get one
      description: "Always returns `{ runs: AutomationRunRow[] }`. No query → recent runs for the brand. `?automationRunId=…` → one-element list (or 404 when missing). Filters: automationId, triggerEventId, triggerInstanceId, recipientEmail, status, mode, from, to, limit, cursor. `?include=logs` embeds per-node log rows in a sibling `logs[]` array."
      parameters:
        - name: automationRunId
          in: query
          required: false
          schema:
            type: string
        - name: automationId
          in: query
          required: false
          schema:
            type: string
        - name: triggerEventId
          in: query
          required: false
          schema:
            type: string
        - name: triggerInstanceId
          in: query
          required: false
          schema:
            type: string
        - name: recipientEmail
          in: query
          required: false
          schema:
            type: string
            format: email
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - pending
              - running
              - completed
              - failed
              - cancelled
        - name: mode
          in: query
          required: false
          schema:
            type: string
            enum:
              - live
              - test
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: include
          in: query
          required: false
          description: "Comma-separated list. Allowed: `logs`."
          schema:
            type: string
      responses:
        "200":
          description: List of runs (single-element when `?automationRunId=…`).
          headers:
            x-request-id:
              schema:
                type: string
                description: Unique request identifier. Share this with support when debugging a request.
                example: req_8cac13fd94e6420cacdd75a1aa403a28
              required: true
              description: Unique request identifier. Share this with support when debugging a request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationRunsListResponse"
              examples:
                list:
                  summary: List mode
                  value:
                    runs: []
                    pagination:
                      limit: 25
                      hasMore: false
        "404":
          description: Automation run not found in this brand.
          headers:
            x-request-id:
              schema:
                type: string
                description: Unique request identifier. Share this with support when debugging a request.
                example: req_8cac13fd94e6420cacdd75a1aa403a28
              required: true
              description: Unique request identifier. Share this with support when debugging a request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorEnvelope"
              example:
                error:
                  code: AUTOMATION_RUN_NOT_FOUND
                  type: not_found
                  message: Automation run 'run_xxx' was not found.
                  suggestion: Use GET /api/v1/automation/runs to list runs.
                  docs: https://docs.brew.new/api-reference/api/errors
                  param: automationRunId
    patch:
      operationId: patchAutomationRun
      tags:
        - Automation Runs
      summary: Cancel an in-flight automation run (P7 — NOT_IMPLEMENTED today)
      description: Currently returns `501 NOT_IMPLEMENTED`. The cancel hook (P7) wires into the wait-node Promise.race so long drips can be interrupted mid-flight.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutomationRunsPatchRequest"
            examples:
              cancel:
                value:
                  automationRunId: run_01HZ
                  status: cancelled
                  reason: recipient unsubscribed
      responses:
        "501":
          description: Cancel is being implemented (P7).
          headers:
            x-request-id:
              schema:
                type: string
                description: Unique request identifier. Share this with support when debugging a request.
                example: req_8cac13fd94e6420cacdd75a1aa403a28
              required: true
              description: Unique request identifier. Share this with support when debugging a request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorEnvelope"
              example:
                error:
                  code: NOT_IMPLEMENTED
                  type: not_implemented
                  message: This endpoint shell is ready, but the business logic is not implemented yet.
                  suggestion: Cancel is part of the P7 work; tracked in docs/email-automations-architecture.md §7.4.
                  docs: https://docs.brew.new/api-reference/api/errors
webhooks: {}
