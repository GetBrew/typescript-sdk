paths:
  /v1/emails:
    get:
      operationId: listEmails
      tags:
        - Emails
      summary: Get emails
      description: "Unified email-design read. Omit `emailId` to LIST the brand’s designs (newest first) under `{ data, pagination }` — each row carries `emailId`, the latest `emailVersionId`, `title`, `status`, `previewImage` (when captured), and `updatedAt`. Filter with `?status=` and the `createdAtFrom/To` + `updatedAtFrom/To` ISO-8601 windows; paginate with `limit` + `cursor`. Pass `?emailId=` to fetch ONE design — returns `{ data: [row] }` (no `pagination`), `404 EMAIL_NOT_FOUND` on an unknown / cross-brand id. Add detail-only `?include=html` (rendered HTML) and/or `?include=versions` (lean `{ version, emailVersionId }` history) — both rejected without `emailId`."
      parameters:
        - schema:
            type: string
            minLength: 1
            maxLength: 64
          required: false
          name: emailId
          in: query
        - schema:
            type: string
          required: false
          name: include
          in: query
        - schema:
            type: string
            enum:
              - streaming
              - complete
              - error
          required: false
          name: status
          in: query
        - schema:
            type: string
            format: date-time
          required: false
          name: createdAtFrom
          in: query
        - schema:
            type: string
            format: date-time
          required: false
          name: createdAtTo
          in: query
        - schema:
            type: string
            format: date-time
          required: false
          name: updatedAtFrom
          in: query
        - schema:
            type: string
            format: date-time
          required: false
          name: updatedAtTo
          in: query
        - schema:
            anyOf:
              - type: number
              - type: string
          required: false
          name: limit
          in: query
        - schema:
            type: string
            minLength: 1
            maxLength: 512
          required: false
          name: cursor
          in: query
      responses:
        "200":
          description: "A page of email designs (list mode), or `{ data: [row] }` (detail mode)."
          headers:
            x-request-id:
              schema:
                type: string
                description: Unique request identifier. Share this with support when debugging a request.
                example: req_8cac13fd94e6420cacdd75a1aa403a28
              required: true
              description: Unique request identifier. Share this with support when debugging a request.
            X-RateLimit-Limit:
              schema:
                type: integer
                description: Requests allowed in the current rolling rate limit window.
                example: 100
              required: true
              description: Requests allowed in the current rolling rate limit window.
            X-RateLimit-Remaining:
              schema:
                type: integer
                description: Requests remaining in the current rolling rate limit window.
                example: 99
              required: true
              description: Requests remaining in the current rolling rate limit window.
            X-RateLimit-Reset:
              schema:
                type: integer
                description: Unix timestamp in seconds for when the rolling window fully resets.
                example: 1712592360
              required: true
              description: Unix timestamp in seconds for when the rolling window fully resets.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailsListResponse"
              example:
                data:
                  - emailId: eml_welcome
                    emailVersionId: emv_welcome_v3
                    title: Welcome Email
                    status: complete
                    previewImage: https://cdn.brew.new/p/eml_welcome.png
                    updatedAt: 2026-04-08T12:34:56.789Z
                  - emailId: eml_digest
                    emailVersionId: emv_digest_v1
                    title: May product digest
                    status: complete
                    updatedAt: 2026-04-07T09:00:00.000Z
                pagination:
                  limit: 100
                  cursor: null
                  hasMore: false
        "400":
          description: Invalid query (unknown param, bad enum, `*From` later than its `*To`, or `include` without `emailId`).
          headers:
            x-request-id:
              schema:
                type: string
                description: Unique request identifier. Share this with support when debugging a request.
                example: req_8cac13fd94e6420cacdd75a1aa403a28
              required: true
              description: Unique request identifier. Share this with support when debugging a request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorEnvelope"
              example:
                error:
                  code: INVALID_REQUEST
