                  param: automationId
    patch:
      operationId: patchAutomation
      tags:
        - Automations
      summary: Update / publish / unpublish an automation
      description: |-
        PATCH body is a discriminated union (one of):

        - **Update** — `{ automationId, name? | description? | nodes? | connections? | triggerEventId? }`.
        - **Publish / unpublish** — `{ automationId, published: true | false, automationVersionId? }`.
        - **Dry-run update** — add `dryRun: true` to the update branch to validate without persisting.

        Bodies that match multiple branches OR no branch are rejected with `400 INVALID_REQUEST`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutomationsPatchRequest"
            examples:
              update:
                summary: Update name + graph
                value:
                  automationId: auto_abc
                  name: Renamed
                  nodes:
                    - *a4
                    - *a5
                  connections:
                    - from: trg
                      to: send_welcome
              publish:
                summary: Publish the latest version
                value:
                  automationId: auto_abc
                  published: true
              publishVersion:
                summary: Publish a specific historical version
                value:
                  automationId: auto_abc
                  automationVersionId: av_v2
                  published: true
              unpublish:
                summary: Unpublish (returns 422 AUTOMATION_NOT_PUBLISHED if never live)
                value:
                  automationId: auto_abc
                  published: false
      responses:
        "200":
          description: "Updated. Returns `{ automations: [row] }` — a one-element list of the updated automation row."
          headers:
            x-request-id:
              schema:
                type: string
                description: Unique request identifier. Share this with support when debugging a request.
                example: req_8cac13fd94e6420cacdd75a1aa403a28
              required: true
              description: Unique request identifier. Share this with support when debugging a request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationsListResponse"
        "409":
          description: Publish validation failed — see message for blockers.
          headers:
            x-request-id:
              schema:
                type: string
                description: Unique request identifier. Share this with support when debugging a request.
                example: req_8cac13fd94e6420cacdd75a1aa403a28
              required: true
              description: Unique request identifier. Share this with support when debugging a request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorEnvelope"
              example:
                error:
                  code: PUBLISH_VALIDATION_FAILED
                  type: conflict
                  message: Add at least one Send Email action
                  suggestion: "Fix every blocker reported in `details.blockers` then PATCH again with { automationId, published: true }."
                  docs: https://docs.brew.new/api-reference/api/errors
        "422":
          description: "Semantic refusals: trying to unpublish an automation that is not currently published."
          headers:
