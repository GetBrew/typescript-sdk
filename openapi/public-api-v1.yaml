    post:
      operationId: generateEmail
      tags:
        - Emails
      summary: Generate an email design
      description: |-
        Generates a new design through the Brew email agent. Emails are pure DESIGNS in the decoupled model — no send state, no type. Sending happens later — `POST /v1/sends` delivers the design to a target (a saved audience, an inline list, or a single address) via a verified domain (or fires a one-off test with `test: true`), or a `sendEmail` node in an automation graph references the returned `emailId` + `emailVersionId`.

        Returns `201` with `{ emailId, emailVersionId, html, previewImage? }` when a design was persisted, or `200` with `{ response }` when the agent answered in prose without writing a design. Supports `Idempotency-Key` for safe retries.
      parameters:
        - &a1
          name: Idempotency-Key
          in: header
          required: false
          description: Optional idempotency key for safe retries. Reusing the same key with the same request body returns the original response for 24 hours.
          schema:
            type: string
            minLength: 1
            maxLength: 100
          example: api-request-2026-04-08-001
      requestBody:
        required: true
        description: Generation prompt plus optional source URLs / reference design. The brand is resolved from the API key and must not be passed.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailGenerateRequest"
            examples:
              basic:
                summary: Generate a design from a prompt
                value:
                  prompt: Create a welcome email for new customers who joined Brew today.
              fromContent:
                summary: Synthesize one email from up to 8 source URLs
                value:
                  prompt: Summarize this month’s product updates into a newsletter.
                  contentUrls:
                    - https://example.com/blog/product-launch
      responses:
        "200":
          description: The agent answered in prose without writing a design (`{ response }`).
          headers:
            x-request-id:
              schema:
                type: string
                description: Unique request identifier. Share this with support when debugging a request.
                example: req_8cac13fd94e6420cacdd75a1aa403a28
              required: true
              description: Unique request identifier. Share this with support when debugging a request.
            X-RateLimit-Limit:
              schema:
                type: integer
                description: Requests allowed in the current rolling rate limit window.
                example: 100
              required: true
              description: Requests allowed in the current rolling rate limit window.
            X-RateLimit-Remaining:
              schema:
                type: integer
                description: Requests remaining in the current rolling rate limit window.
                example: 99
              required: true
              description: Requests remaining in the current rolling rate limit window.
            X-RateLimit-Reset:
              schema:
                type: integer
                description: Unix timestamp in seconds for when the rolling window fully resets.
                example: 1712592360
              required: true
              description: Unix timestamp in seconds for when the rolling window fully resets.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailGenerateTextResponse"
              example: &a3
                response: No email was generated.
        "201":
          description: "A design was persisted. Usage-metered: the actual token usage of the email agent is charged (no fixed price, so no `X-Credit-Cost` header). `emailVersionId` pins the exact version for sends + automation `sendEmail` nodes."
          headers:
            x-request-id:
              schema:
                type: string
                description: Unique request identifier. Share this with support when debugging a request.
                example: req_8cac13fd94e6420cacdd75a1aa403a28
              required: true
              description: Unique request identifier. Share this with support when debugging a request.
            X-RateLimit-Limit:
              schema:
                type: integer
                description: Requests allowed in the current rolling rate limit window.
                example: 100
              required: true
              description: Requests allowed in the current rolling rate limit window.
            X-RateLimit-Remaining:
              schema:
                type: integer
                description: Requests remaining in the current rolling rate limit window.
                example: 99
              required: true
              description: Requests remaining in the current rolling rate limit window.
            X-RateLimit-Reset:
              schema:
                type: integer
                description: Unix timestamp in seconds for when the rolling window fully resets.
                example: 1712592360
              required: true
              description: Unix timestamp in seconds for when the rolling window fully resets.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailGenerateGeneratedResponse"
              example: &a2
                emailId: eml_2SmZOWV3ZQ7W5x6g3m4p
                emailVersionId: emv_2SmZOWV3ZQ7W5x6g3m4p_v1
