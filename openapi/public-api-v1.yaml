                example: 1712592360
              required: true
              description: Unix timestamp in seconds for when the rolling window fully resets.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactsDeleteResponse"
              examples:
                allDeleted:
                  summary: All requested contacts were deleted
                  value:
                    deleted: 2
