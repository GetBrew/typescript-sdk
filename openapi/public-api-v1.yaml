  /v1/sends:
    post:
      operationId: createSend
      tags:
        - Sends
      summary: Create Send
      description: |-
        Starts an async send job for a saved email. Use `audienceId` or explicit `emails`. POST supports idempotency for safe retries.

        Brand scoping: API keys are bound to a single brand. The send is always recorded against the API key brand and you cannot pass a `brandId` body field. Resources (`emailId`, `audienceId`) that exist in a different brand within the same organization are intentionally surfaced as `404` (rather than `403`) so the API never confirms the existence of resources outside the caller brand.
      parameters:
        - *a2
      requestBody:
        required: true
        description: Send request for an existing saved email.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendsPostRequest"
            examples:
              audience:
                summary: Audience send
                value:
                  emailId: email_123
                  domainId: domain_123
                  subject: Welcome to Brew
                  audienceId: audience_123
                  scheduledAt: 2099-01-01T00:00:00.000Z
              manual:
                summary: Manual email send
                value:
                  emailId: email_123
                  domainId: domain_123
                  subject: Welcome to Brew
                  emails:
                    - ada@example.com
                    - grace@example.com
      responses:
        "202":
          description: The send was accepted and queued or scheduled.
          headers:
            x-request-id:
              schema:
                type: string
                description: Unique request identifier. Share this with support when debugging a request.
                example: req_8cac13fd94e6420cacdd75a1aa403a28
              required: true
              description: Unique request identifier. Share this with support when debugging a request.
            X-RateLimit-Limit:
              schema:
                type: integer
                description: Requests allowed in the current rolling rate limit window.
                example: 100
              required: true
              description: Requests allowed in the current rolling rate limit window.
            X-RateLimit-Remaining:
              schema:
                type: integer
                description: Requests remaining in the current rolling rate limit window.
                example: 99
              required: true
              description: Requests remaining in the current rolling rate limit window.
            X-RateLimit-Reset:
              schema:
                type: integer
                description: Unix timestamp in seconds for when the rolling window fully resets.
                example: 1712592360
              required: true
              description: Unix timestamp in seconds for when the rolling window fully resets.
          content:
