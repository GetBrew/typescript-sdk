        - schema:
            type: string
            minLength: 1
            maxLength: 500
          required: false
          name: q
          in: query
        - schema:
            type: string
            minLength: 1
            maxLength: 40
          required: false
          name: type
          in: query
        - schema:
            type: string
            minLength: 1
            maxLength: 20
          required: false
          name: aspectRatio
          in: query
        - schema:
            anyOf:
              - type: number
              - type: string
          required: false
          name: limit
          in: query
        - schema:
            type: string
            minLength: 1
            maxLength: 512
          required: false
          name: cursor
          in: query
      responses:
        "200":
          description: A page of brand images (semantic results when `?q=`).
          headers:
            x-request-id:
              schema:
                type: string
                description: Unique request identifier. Share this with support when debugging a request.
