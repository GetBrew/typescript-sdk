    patch:
      operationId: editEmail
      tags:
        - Emails
      summary: Edit an email design (AI prompt or manual JSX)
      description: |-
        Writes a new `version: "latest"` row on the same `emailId` (the previous head is demoted to a numeric historical version) via one of two mutually-exclusive bodies:

        - **AI edit** — `{ prompt }` (optionally a `emailVersionId` source pin + `contentUrls`): runs the Brew email agent against the design’s current latest JSX (or the pinned version).
        - **Manual JSX save** — `{ jsx }`: persists hand-authored / pasted React-Email JSX verbatim (rendered to HTML server-side), no agent involved — the same operation the in-app canvas editor performs.

        Supply exactly one of `prompt` / `jsx`; a body carrying both is rejected `400 INVALID_REQUEST`. Returns the generated-email shape with the new `emailVersionId`.
      parameters:
        - schema:
            type: string
            minLength: 1
            maxLength: 64
            description: Design id returned by `POST /v1/emails` and listed by `GET /v1/emails`.
            example: eml_2SmZOWV3ZQ7W5x6g3m4p
          required: true
          description: Design id returned by `POST /v1/emails` and listed by `GET /v1/emails`.
          name: emailId
          in: path
      requestBody:
        required: true
        description: Either an AI edit (`prompt`, optional `emailVersionId` source pin, optional `contentUrls`) OR a manual JSX save (`jsx`). Identity lives on the path. Exactly one of `prompt` / `jsx` must be present.
        content:
          application/json:
            schema:
              anyOf:
                - $ref: "#/components/schemas/EmailEditRequest"
                - $ref: "#/components/schemas/EmailJsxSaveRequest"
            examples:
              aiEdit:
                summary: AI prompt edit
                value:
                  prompt: Tighten the headline and replace the CTA copy with "Get started today".
