  /v1/sends:
    post:
      operationId: createSend
      tags:
        - Sends
      summary: Create a campaign send
      description: |-
        Starts an async campaign send: one design (`emailId`, optionally pinned to an exact `emailVersionId`) via a verified domain. A design can be sent unlimited times — every call mints a new send. Returns `202` with the `sendId` to poll via `GET /v1/analytics/sends/{sendId}`.

        Recipients — provide EXACTLY ONE of:
        - `audienceId` — a saved audience (any size), or
        - `to` — inline addresses (a single email or an array, max 50). For larger lists, save an audience.

        Inline recipients face the same unsubscribe/suppression gate and per-recipient send quota as audience sends.

        Test deliveries live on their own endpoint (`POST /v1/sends/test`) — there is no mode discriminator in this body. For per-recipient event-driven delivery, publish an automation and fire its trigger (`POST /v1/automations/triggers/{triggerEventId}/fire`).

        Brand scoping: resources (`emailId`, `domainId`, `audienceId`) living in a different brand surface as `404` so the API never confirms cross-brand existence.
      parameters:
        - *a4
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendsPostRequest"
            examples:
              now:
                summary: Send the latest version to an audience now
                value:
                  emailId: eml_welcome
                  domainId: kx7bkh53hasmfeh5kd7sqgykt187g8ww
                  subject: Welcome to Brew
                  audienceId: aud_subscribers
              scheduledPinned:
                summary: Schedule a pinned version for later
                value:
                  emailId: eml_welcome
                  emailVersionId: emv_welcome_v2
                  domainId: kx7bkh53hasmfeh5kd7sqgykt187g8ww
                  subject: Welcome to Brew
                  previewText: Get started in 2 minutes.
                  audienceId: aud_subscribers
                  scheduledAt: 2099-01-01T00:00:00.000Z
              inline:
                summary: Send to inline recipients (no saved audience)
                value:
                  emailId: eml_welcome
                  domainId: kx7bkh53hasmfeh5kd7sqgykt187g8ww
                  subject: Welcome to Brew
                  to:
                    - founder@acme.com
                    - design@acme.com
      responses:
        "202":
          description: The campaign send was accepted (queued or scheduled).
          headers:
            x-request-id:
              schema:
                type: string
                description: Unique request identifier. Share this with support when debugging a request.
                example: req_8cac13fd94e6420cacdd75a1aa403a28
              required: true
              description: Unique request identifier. Share this with support when debugging a request.
            X-RateLimit-Limit:
              schema:
