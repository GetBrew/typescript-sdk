            - streaming
            - complete
            - error
        previewImage:
          type: string
          format: uri
        updatedAt:
          type: string
          format: date-time
        html:
          type: string
        versions:
          type: array
          items:
            type: object
            properties:
              version:
                anyOf:
                  - type: integer
                    minimum: 0
                  - type: string
                    enum:
                      - latest
              emailVersionId:
                type: string
                minLength: 1
            required:
              - version
              - emailVersionId
            additionalProperties: false
      required:
        - emailId
        - title
        - status
        - updatedAt
      additionalProperties: false
    EmailDetail:
