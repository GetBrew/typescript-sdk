  /v1/automations:
    post:
      operationId: createAutomation
      tags:
        - Automations
      summary: Create an automation
      description: |-
        Deterministic create — the body carries the full graph (`{ name, triggerEventId, nodes, connections }`). Returns `201` with the bare `AutomationRow`. The new automation starts as a draft; promote it with `POST /v1/automations/{automationId}/publish`.

        Chain `POST /v1/emails { prompt }` first to mint the design each `sendEmail` node references — every `sendEmail` node MUST carry `emailId`, `emailVersionId`, `domainId`, `subject`, `previewText`.

        **Dry-run** — add `dryRun: true` to validate without persisting; returns `200` with `{ valid, blockers[], warnings[], nodeCounts }`.
      parameters:
        - *a4
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutomationsPostRequest"
            examples:
              deterministic:
                summary: Create a trigger → sendEmail flow
                value:
                  name: Welcome flow
                  description: Welcome new signups
                  triggerEventId: tri_signup
                  nodes:
                    - &a9
                      id: trg
                      label: On signup
                      type: trigger
                      config:
                        actionType: trigger
                    - &a10
                      id: send_welcome
                      label: Welcome
                      type: sendEmail
                      config:
                        actionType: sendEmail
                        emailId: eml_welcome
                        emailVersionId: emv_welcome_v1
                        domainId: kx7bkh53hasmfeh5kd7sqgykt187g8ww
                        subject: Welcome to Brew, {{firstName | there}}!
                        previewText: Thanks for signing up — get started in 2 minutes.
                        fromName: Brew
                        replyTo: support@example.com
                  connections:
                    - from: trg
                      to: send_welcome
              dryRun:
                summary: Validate without persisting
                value:
                  name: preview
                  triggerEventId: tri_signup
                  nodes:
                    - *a9
                  connections: []
                  dryRun: true
      responses:
        "200":
          description: Dry-run result (no writes). `valid` indicates whether the graph would publish cleanly.
          headers:
            x-request-id:
              schema:
                type: string
                description: Unique request identifier. Share this with support when debugging a request.
                example: req_8cac13fd94e6420cacdd75a1aa403a28
              required: true
              description: Unique request identifier. Share this with support when debugging a request.
        "201":
          description: Created. The bare automation row (draft, full graph).
          headers:
            x-request-id:
              schema:
                type: string
                description: Unique request identifier. Share this with support when debugging a request.
                example: req_8cac13fd94e6420cacdd75a1aa403a28
              required: true
              description: Unique request identifier. Share this with support when debugging a request.
            X-RateLimit-Limit:
              schema:
                type: integer
                description: Requests allowed in the current rolling rate limit window.
                example: 100
              required: true
              description: Requests allowed in the current rolling rate limit window.
            X-RateLimit-Remaining:
              schema:
                type: integer
                description: Requests remaining in the current rolling rate limit window.
                example: 99
              required: true
              description: Requests remaining in the current rolling rate limit window.
            X-RateLimit-Reset:
