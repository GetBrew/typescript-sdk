  /v1/contacts/search:
    post:
      operationId: searchContacts
      tags:
        - Contacts
      summary: Get contacts
      description: |-
        The single "Get Contacts" read. Structured search over the brand’s contacts: free-text `search`, typed `filters` (`{ field, operator, value }` combined with `logic: "and" | "or"`), `sort` + `order`, and cursor pagination. Returns `{ data, pagination }`.

        Folds the former `GET /v1/contacts` (omit all filters to list everything) and `GET /v1/contacts/{email}` (use `filters: [{ field: "email", operator: "equals", value: "…" }]`).

        Pass an optional `audienceId` to scope the search to a saved audience’s members — its stored filter is ANDed with `filters` (an unknown / cross-brand id → `400`).

        Set `count: true` to get `{ count }` instead of a page.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactsSearchRequest"
            examples:
              filtered:
                summary: Filter + sort
                value:
                  filters:
                    - field: plan
                      operator: equals
                      value: enterprise
                  sort: createdAt
                  order: desc
                  limit: 50
              count:
                summary: Count only
                value:
                  filters:
                    - field: subscribed
                      operator: equals
                      value: "true"
                  count: true
      responses:
        "200":
          description: "A page of matching contacts — or `{ count }` when `count: true`."
          headers:
            x-request-id:
              schema:
                type: string
                description: Unique request identifier. Share this with support when debugging a request.
                example: req_8cac13fd94e6420cacdd75a1aa403a28
              required: true
              description: Unique request identifier. Share this with support when debugging a request.
            X-RateLimit-Limit:
              schema:
                type: integer
                description: Requests allowed in the current rolling rate limit window.
                example: 100
              required: true
              description: Requests allowed in the current rolling rate limit window.
            X-RateLimit-Remaining:
              schema:
                type: integer
                description: Requests remaining in the current rolling rate limit window.
                example: 99
              required: true
              description: Requests remaining in the current rolling rate limit window.
            X-RateLimit-Reset:
              schema:
                type: integer
                description: Unix timestamp in seconds for when the rolling window fully resets.
