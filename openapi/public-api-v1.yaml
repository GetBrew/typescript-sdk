openapi: 3.1.0
info:
  title: Brew Public API v1
  version: 1.0.0
  description: |-
    Generated from the Brew app Zod contracts for the current `/api/v1/contacts`, `/api/v1/audiences`, `/api/v1/domains`, `/api/v1/fields`, `/api/v1/emails`, `/api/v1/templates`, `/api/v1/sends`, and `/api/v1/events` endpoints. This file is the source of truth for the public API documentation.

    ## Brand scoping

    API keys are always scoped to a specific brand. The brand is resolved from the key on every request. **No public endpoint accepts a `brandId` field** in its request body or query string — sending one returns `400 INVALID_REQUEST`.

    - Brand-scoped list and read endpoints (`/v1/audiences`, `/v1/domains`, `/v1/emails`, `/v1/contacts`, `/v1/fields`) automatically filter to the key brand.
    - Endpoints that operate on resources tagged with another brand return `404` (resource not visible). `POST /v1/events` returns `403 BRAND_SCOPE_MISMATCH` when the matched trigger event is in a different brand.
    - `GET /v1/templates` is organization-wide and not constrained to the key brand.
    - `GET /v1/domains` returns verified sending domains for the key brand.
    - Brands themselves are managed in the Brew dashboard. The dashboard `brandId` is the value bound to your API key and never needs to be passed in a request.

    ## Triggering events

    External events fire via `POST /v1/events` with `triggerEventId` in the JSON body. The path is FIXED — trigger names, titles, and `providerEventKey` are descriptors and never appear in the URL. Use the `Idempotency-Key` header for safe retries.

    The legacy alias `POST /api/trigger/event` accepts the same body and is kept for back-compat. New integrations should target `POST /v1/events`. The legacy automation-scoped route `POST /api/automations/{automationId}/trigger` is deprecated (returns `Deprecation: true` and a `Sunset` header).
  contact:
    name: Brew Support
    url: https://docs.brew.new
    email: support@brew.new
servers:
  - url: https://brew.new/api
    description: Production
  - url: http://localhost:3000/api
    description: Local development
security:
  - bearerAuth: []
  - apiKeyAuth: []
tags:
  - name: Contacts
    description: Create, query, patch, and delete contacts.
  - name: Audiences
    description: List saved audiences available for the org.
  - name: Domains
    description: List verified sending domains available for the org.
  - name: Contact Fields
    description: List, create, and delete custom contact field definitions.
  - name: Emails
    description: Generate draft emails through the Brew email agent.
  - name: Templates
    description: List public templates that can be used as references.
  - name: Sends
    description: Start async send jobs for saved emails.
  - name: Events
    description: Fire trigger events that start published automations and send transactional emails.
  - name: Triggers
    description: Manage trigger event definitions (the schema + lifecycle that automations subscribe to). Flat /v1/triggers route — POST/GET/PATCH/DELETE only; identifiers in body/query.
  - name: Automations
    description: Manage automation graphs end-to-end — create deterministically, generate from a prompt (AI), patch / publish / unpublish / regenerate, cascade-delete. Flat /v1/automations route.
  - name: Executions
    description: Fire triggers, test automations, replay historical fires, read execution history. Flat /v1/executions route — folds in what /v1/events did before.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key
      description: "Send your Brew API key as `Authorization: Bearer brew_xxx`."
      x-default: Bearer brew_your_api_key
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: "Send your Brew API key as `X-API-Key: brew_xxx`."
      x-default: brew_your_api_key
  schemas:
    EmailType:
      type: string
      enum:
        - campaign
        - automation
        - transactional
    EmailListItem:
      type: object
      properties:
        emailId:
          type: string
          minLength: 1
        emailTitle:
          type: string
          minLength: 1
        emailType:
          type: string
          enum:
            - campaign
            - automation
            - transactional
      required:
        - emailId
        - emailTitle
        - emailType
      additionalProperties: false
    TriggerRow:
      type: object
      properties:
        triggerEventId:
          type: string
          minLength: 1
          maxLength: 256
        title:
          type: string
          minLength: 1
          maxLength: 120
        description:
          type: string
          maxLength: 2000
        provider:
          type: string
          enum:
            - brew_api
            - clerk
            - stripe
            - shopify
            - stytch
            - supabase
            - workos
            - revenuecat
            - custom
        providerEventKey:
          type: string
        status:
          type: string
          enum:
            - enabled
            - disabled
        payloadSchema:
          type: object
          properties:
            type:
              type: string
              enum:
                - object
            fields:
              type: array
              items:
                type: object
                properties:
                  key:
                    type: string
                    minLength: 1
                    description: Variable name used by emails and automations, e.g. email or firstName. Prefer self-descriptive keys; this column has no separate description field.
                  type:
                    type: string
                    enum:
                      - string
                      - int
                      - boolean
                  required:
                    type: boolean
                  fallbackValue:
                    anyOf:
                      - type: string
                      - type: number
                      - type: boolean
                    description: Substitution value when the inbound payload is missing this field. Also used as the email agent's `e.g. {{ key | fallback }}` example.
                  pii:
                    type: string
                    enum:
                      - none
                      - low
                      - high
                    description: PII classification for redaction. "high" auto-redacts the value in execution logs and the inbound log. "low" (default when omitted) preserves the value. "none" is an explicit marker that the field is non-personal.
                required:
                  - key
                  - type
                  - required
          required:
            - type
            - fields
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - triggerEventId
        - title
        - provider
        - status
        - payloadSchema
        - createdAt
        - updatedAt
      additionalProperties: false
