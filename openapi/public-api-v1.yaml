        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactsPostRequest"
            examples:
              single:
                summary: Upsert a single contact
                value:
                  email: jane@example.com
                  firstName: Jane
                  customFields:
                    plan: enterprise
              batch:
                summary: Upsert a batch
                value:
                  contacts:
                    - email: jane@example.com
                      firstName: Jane
                    - email: john@example.com
                      firstName: John
