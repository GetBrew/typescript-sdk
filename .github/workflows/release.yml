name: Release

# Triggered by pushing a tag like `v1.2.3` to the repo. The job:
#   1. Re-runs the full ci.yml validation pipeline (tsc, lint, format,
#      test, build, generated-types freshness) so the published tarball
#      can never diverge from main's quality bar.
#   2. Asserts package.json#version equals the tag (minus the leading
#      `v`) — protects against accidentally tagging without bumping.
#   3. Publishes to npm as `@brew.new/sdk@<version>` with provenance
#      attestation enabled, signed by GitHub's OIDC token. The
#      attestation is automatically uploaded to npmjs.com so the
#      package page shows a "verified" badge linking back to this
#      workflow run.
#   4. Creates a GitHub Release page from the tag for changelog
#      visibility.
#
# Recipe (from the typescript-sdk repo, on a clean main):
#   npm version <patch|minor|major|x.y.z> --no-git-tag-version
#   git add package.json && git commit -m "Release vX.Y.Z"
#   git push origin main
#   git tag vX.Y.Z
#   git push origin vX.Y.Z   <-- this is what triggers this workflow

on:
  push:
    tags:
      - 'v*.*.*'

# A second `v*` push for the same SHA would rerun this and fail at
# `npm publish` (cannot republish). cancel-in-progress is safe.
concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: validate + publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # `id-token: write` is required for npm provenance via OIDC.
    # `contents: write` is required for the GitHub Release creation
    # step.
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Set up Node.js (for npm publish)
        # Bun ships an `npm` binary but it is a thin shim. The official
        # Node-bundled `npm` is what supports `--provenance` reliably.
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Assert package.json version matches tag
        # Strip the leading `v` from the tag and compare. If a developer
        # forgets to bump package.json before tagging, fail loudly here
        # rather than publish a tarball whose internal version drifts
        # from the tag (and from the dist-tag).
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json#version $PKG_VERSION"
            exit 1
          fi
          echo "Releasing version $PKG_VERSION"

      - name: Typecheck
        run: bun tsc

      - name: Lint
        run: bun lint

      - name: Prettier (check only)
        run: bun run format:check

      - name: Test
        # NEVER `bun test` — that bypasses vitest setupFiles and MSW.
        run: bun run test

      - name: Build
        run: bun run build

      - name: Generated types are up to date
        run: |
          bun run generate:types
          git diff --exit-code src/generated/openapi-types.ts

      - name: Publish to npm with provenance
        # `--provenance` requires `id-token: write` (see permissions
        # block above). The attestation is uploaded automatically and
        # links the tarball back to this workflow run for supply-chain
        # verification on npmjs.com.
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
